header{

nav{

.hero{

.hero video{

.hero-text{
position:absolute;

.food-grid{

.food-grid img{

.slider{
display:flex;

}

.slider img{

@keyframes slide{
0%{transform:translateX(0)}

}

flex-wrap:wrap;

justify-content:center;
}

}
